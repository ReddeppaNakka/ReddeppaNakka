name: Dynamic README Update

on:
  schedule:
    # Every 12 hours. Keep this modest — the profile does not need minute-level freshness.
    - cron: "30 1,13 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_readme.py"
      - ".github/workflows/update-readme.yml"

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh auto-generated README blocks
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_readme.py

      - name: Commit if the README actually changed
        run: |
          if [[ -z "$(git status --porcelain README.md)" ]]; then
            echo "No README changes; skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(readme): refresh activity feed [skip ci]"
          git push
